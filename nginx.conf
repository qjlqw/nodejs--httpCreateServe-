
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;
client_max_body_size 20m;
	client_body_buffer_size 200k;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;
	

    server {
        listen       81;
        server_name  localhost;

        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        # location / {
        #    root   html;
        #    index  index.html index.htm;
        # }

          # target: `http://192.168.0.52:8080/`, //陈文杰
        # target: `http://192.168.182.241:8080/`, //潘亮
        # target: `http://192.168.12.193:8080/`, //王健康
        # target: `http://192.168.183.158:8080/`, //黄丹
        # target: `http://192.168.183.199:8080/`, //魏书克
        # target: `http://192.168.182.213:8081/`, //程帅
        # target: `http://192.168.182.60:8080/`, //侯文凯
        # target: `http://192.168.18.26:8090/`, //王常有
        # target: `http://192.168.182.136:8080/`, //郑超明
	#   http://192.168.0.66:9001   // 0.66
	#   http://192.168.0.237:8898/emr-prod-api   // 237

        location / {
            proxy_pass  http://192.168.0.9:5530;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }

    server { 
        listen  83;
        server_name localhost;

        # target: `http://192.168.12.193:8081/`, //王健康
        # target: `http://192.168.182.58:8081/`, //侯文凯
        # target: `http://192.168.182.53:8081/`, //王常有
        # target: `http://192.168.182.136:8081/`, //郑超明
	# target: `http://192.168.183.158:8081/`, //黄丹
	# target: `http://192.168.0.66:9002/`, //0.66
	# target: `http://192.168.0.9:5526/`, //0.9
	# http://192.168.0.237:8898/mzys-prod-api   //237

        location / {
		proxy_pass http://192.168.0.66:9002;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    server {
        listen  85;
        server_name localhost;

        # target: `http://192.168.12.193:8082/`, //王健康
        # target: `http://192.168.182.58:8082/`, //侯文凯
        # target: `http://192.168.18.26:8090/`, //王常有
        # target: `http://192.168.182.136:8082/`, //郑超明
	# target: `http://192.168.183.158:8082/`, //黄丹
        # target: `http://192.168.182.213:8082/`, //程帅
	# http://192.168.0.66:9003  //0.66
        location / {
            proxy_pass http://192.168.0.66:9003;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

