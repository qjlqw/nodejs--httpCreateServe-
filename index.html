<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<form id="myForm" action="http://127.0.0.1:5174/loginIN" method="post" enctype="application/x-www-form-urlencoded" target="_self">
			<input type="text" name="username" value="admin" id="username" />
			<input type="password" name="password" value="admin" id="password" />
			<input type="submit" value="提交" />
		</form>
		<form id="Form" action="http://127.0.0.1:5174/loginIN" method="get" enctype="application/x-www-form-urlencoded" target="_self">
			<input type="text" name="username" value="admin" id="username" />
			<input type="password" name="password" value="admin" id="password" />
			<input type="submit" value="提交" />
		</form>
		<script type="text/javascript">
			document.getElementById('myForm').addEventListener('submit', function (event) {
			   event.preventDefault();
			   const formData = new FormData(this);
			   const jsonData = {};

			   for (const [key, value] of formData.entries()) {
			     jsonData[key] = value;
			   }
			      fetch(`http://127.0.0.1:5174/loginIN`,{
			       method:'post',
			       headers:{
			         'Content-Type':'application/json'
			       },
			       body:JSON.stringify(jsonData)
			      }).then(Response => {
			            console.log(Response)
									return Response.json()
			         }).then(data => {
								 console.log(data)
							 }).catch(err => {
								 console.log(err)
							 })


			   console.log(jsonData);
			 });
			 document.getElementById('Form').addEventListener('submit', function (event) {
			   event.preventDefault();
			   const formData = new FormData(this);
			   const jsonDataParts = [];

			   for (const [key, value] of formData.entries()) {
			     jsonDataParts.push(`${encodeURIComponent(key)}=${encodeURIComponent(value)}`)
			   }
				 const jsonData = jsonDataParts.join('&');
			      fetch(`http://127.0.0.1:5174/loginIN?${jsonData}`,{
			       method:'get',
			       headers:{
			         'Content-Type':'application/json'
			       },
			      }).then(Response => {
			            console.log(Response)
									return Response.json()
			         }).then(data => {
								 console.log(data)
							 }).catch(err => {
								 console.log(err)
							 })


			   console.log(jsonData);
			 });
		</script>
	</body>
</html>
